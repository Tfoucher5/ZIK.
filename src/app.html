<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- LIGHT -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon-light/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="shortcut icon"
      href="/favicon-light/favicon.ico"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/favicon-light/favicon-96x96.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon-light/apple-touch-icon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="manifest"
      href="/favicon-light/site.webmanifest"
      media="(prefers-color-scheme: light)"
    />

    <!-- DARK -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon-dark/favicon.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="shortcut icon"
      href="/favicon-dark/favicon.ico"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/favicon-dark/favicon-96x96.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon-dark/apple-touch-icon.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="manifest"
      href="/favicon-dark/site.webmanifest"
      media="(prefers-color-scheme: dark)"
    />

    <meta name="apple-mobile-web-app-title" content="Zik-Music.fr" />
    <meta
      name="theme-color"
      content="#0f0a1e"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts async (non-render-blocking) — display=swap évite le FOIT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="/css/theme.css" />
    %sveltekit.head%
    <!-- Theme / animation preference (inline to avoid FOUC) -->
    <script>
      (function () {
        var t = localStorage.getItem("zik_theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
        // Legacy: migrate zik_dark → zik_theme
        if (!localStorage.getItem("zik_theme")) {
          var d = localStorage.getItem("zik_dark");
          if (d === "false") {
            localStorage.setItem("zik_theme", "light");
            document.documentElement.setAttribute("data-theme", "light");
          }
        }
        if (localStorage.getItem("zik_animations") === "off") {
          document.documentElement.classList.add("no-animations");
        }
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
