name: Code Quality & Auto-Fix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important pour que GitHub puisse push les corrections
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and Fix
        run: |
          npx eslint . --fix
          npx prettier . --write

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix linting and formatting [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}