<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIK — Parametres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/settings.css">
  <script src="/js/prefs.js"></script>
</head>
<body>

  <nav id="navbar">
    <a href="/" class="nav-logo">ZIK<span>.</span></a>
    <div class="nav-right">
      <div id="nav-user" style="display:none">
        <a href="/playlists" class="btn-ghost sm" style="text-decoration:none">Mes playlists</a>
        <div class="nav-profile-wrap">
          <button class="nav-avatar-wrap" id="nav-profile-trigger">
            <img id="nav-avatar" src="" alt="">
            <span id="nav-username"></span>
            <span class="nav-chevron">▾</span>
          </button>
          <div class="nav-dropdown" id="nav-dropdown">
            <a href="/profile" class="nav-dd-item">Mon profil</a>
            <a href="/rooms" class="nav-dd-item">Rooms</a>
            <a href="/settings" class="nav-dd-item">Parametres</a>
            <button class="nav-dd-item nav-dd-logout" id="logoutBtn">Deconnexion</button>
          </div>
        </div>
      </div>
      <div id="nav-auth" style="display:none">
        <button class="btn-ghost sm" id="openLoginBtn">Connexion</button>
      </div>
    </div>
  </nav>

  <main class="settings-page">
    <div class="settings-container">
      <h1 class="settings-title">Parametres</h1>
      <p class="settings-sub">Personnalise ton experience ZIK.</p>

      <!-- Section : Visuel -->
      <section class="settings-section">
        <h2 class="settings-section-title">Visuel</h2>

        <div class="settings-row">
          <div class="settings-row-info">
            <div class="settings-row-label">Animations</div>
            <div class="settings-row-desc">Active ou desactive les animations de l'interface (cartes, scores, transitions).</div>
          </div>
          <label class="toggle-switch" aria-label="Activer les animations">
            <input type="checkbox" id="pref-animations" checked>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </section>

      <!-- Section : Jeu -->
      <section class="settings-section">
        <h2 class="settings-section-title">Jeu</h2>

        <div class="settings-row">
          <div class="settings-row-info">
            <div class="settings-row-label">Volume par defaut</div>
            <div class="settings-row-desc">Volume de la musique au demarrage d'une partie.</div>
          </div>
          <div class="settings-vol-wrap">
            <input type="range" id="pref-volume" min="0" max="100" step="5" value="50">
            <span class="settings-vol-val" id="pref-volume-val">50%</span>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/settings.js"></script>
</body>
</html>
