<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIK — En jeu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/game.css">
  <script src="/js/prefs.js"></script>
</head>
<body>
<div id="app">

  <!-- Timer bar -->
  <div id="timer-wrap"><div id="timer-bar"></div></div>

  <div id="game-screen">

    <!-- Header -->
    <header class="g-header">
      <a href="/" class="back">← Rooms</a>
      <div class="header-mid">
        <div id="room-label" class="room-label"></div>
        <div id="round-info" class="round-info">En attente…</div>
      </div>
      <div class="vol-ctrl">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volSlider" min="0" max="100" value="50">
      </div>
    </header>

    <!-- Left: scoreboard -->
    <aside id="sidebar-left">
      <div class="side-title">Joueurs</div>
      <div id="player-list"></div>
    </aside>

    <!-- Center -->
    <main id="center">

      <!-- Album art -->
      <div id="cover-wrap">
        <div id="cover-placeholder">
          <div class="vinyl"></div>
          <span class="vinyl-q">?</span>
        </div>
        <img id="cover-img" src="" alt="Album cover" style="display:none">
      </div>

      <!-- Artist / Title slots -->
      <div class="slots" id="slots-wrap">
        <div class="slot" id="slot-artist">
          <span class="slot-label">Artiste</span>
          <div class="slot-val">???</div>
        </div>
        <div class="slot" id="slot-feat" style="display:none">
          <span class="slot-label">Feat.</span>
          <div class="slot-val">???</div>
        </div>
        <div class="slot" id="slot-title">
          <span class="slot-label">Titre</span>
          <div class="slot-val">???</div>
        </div>
      </div>

      <!-- Feedback line -->
      <div id="feedback"></div>

      <!-- Round summary (between rounds) -->
      <div id="round-summary" style="display:none">
        <p id="summary-reason"></p>
        <p id="summary-finder"></p>
      </div>

      <!-- Error -->
      <div id="error-msg" style="display:none"></div>

      <!-- Start / waiting button -->
      <button id="startBtn" class="start-btn">🎮 Lancer la partie</button>

    </main>

    <!-- Right: history -->
    <aside id="sidebar-right">
      <div class="side-title">Historique</div>
      <div id="history-list"></div>
    </aside>

    <!-- Footer input -->
    <footer class="g-footer">
      <div class="guess-wrap">
        <input
          type="text"
          id="guessInput"
          placeholder="Artiste ou titre…"
          disabled
          autocomplete="off"
          maxlength="100"
        >
        <span class="guess-hint">↵</span>
      </div>
    </footer>

  </div>

  <!-- Game Over overlay -->
  <div id="gameover" style="display:none">
    <div class="go-card">
      <div class="go-title">🏁 Partie terminée</div>
      <div id="go-scores"></div>
      <div class="go-actions">
        <button id="replayBtn" class="start-btn">🔄 Rejouer</button>
        <a href="/" class="go-back">← Changer de room</a>
      </div>
    </div>
  </div>

</div>

<!-- Hidden YouTube player -->
<div id="yt-player" style="position:fixed;bottom:-1px;left:-1px;width:1px;height:1px;overflow:hidden;pointer-events:none"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="/js/game.js"></script>
</body>
</html>
